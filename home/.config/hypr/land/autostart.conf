# Apps
exec-once = $terminal
exec-once = clipse -listen
exec-once = qs
exec-once = hypridle
exec-once = hyprsunset
exec-once = fcitx5 -d &

# User Services
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user start pipewire.socket
exec-once = systemctl --user start pipewire-pulse.service
exec-once = systemctl --user start wireplumber.service

# Import the full session environment so portals and other D-Bus-activated services
# see the same Wayland/toolkit variables as the compositor session.
exec-once = dbus-update-activation-environment --systemd --all
