# Apps
exec-once = $terminal
exec-once = clipse -listen
exec-once = qs
exec-once = hyprpaper
exec-once = hypridle
exec-once = hyprsunset
exec-once = fcitx5 -d &

# Services
exec-once = systemctl --user start hyprpolkitagent
exec-once = systemctl --user start NetworkManager.service
exec-once = systemctl --user start ModemManager.service
exec-once = systemctl --user start bluetooth.service
exec-once = systemctl --user start cups.service
exec-once = systemctl --user start power-profiles-daemon.service

# Import the full session environment so portals and other D-Bus-activated services
# see the same Wayland/toolkit variables as the compositor session.
exec-once = dbus-update-activation-environment --systemd --all
