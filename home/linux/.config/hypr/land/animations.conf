# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = windowIn, 0.12, 0.95, 0.08, 1.05
    bezier = windowOut, 0.22, 1, 0.36, 1
    bezier = workspaceMove, 0.2, 0.9, 0.1, 1
    bezier = emphasis, 0.34, 1.56, 0.64, 1

    animation = windows, 1, 8, windowIn, slide
    animation = windowsOut, 1, 7, windowOut, popin 72%
    animation = border, 1, 12, emphasis
    animation = borderangle, 1, 10, emphasis
    animation = fade, 1, 8, windowIn
    animation = workspaces, 1, 7, workspaceMove, slide
}
